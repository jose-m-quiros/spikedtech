<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPIKEDTECH — Sitio en mantenimiento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        background: #080c12;
        color: #ffffff;
        font-family: "Space Grotesk", sans-serif;
        overflow: hidden;
        user-select: none;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        position: relative;
      }

      .grid-bg {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 200, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 200, 255, 0.03) 1px, transparent 1px);
        background-size: 48px 48px;
        pointer-events: none;
        z-index: 0;
      }

      .glow {
        position: fixed;
        width: 700px;
        height: 700px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(0, 180, 255, 0.07) 0%,
          transparent 70%
        );
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 0;
        animation: pulse-glow 5s ease-in-out infinite;
      }

      @keyframes pulse-glow {
        0%,
        100% {
          opacity: 0.5;
          transform: translate(-50%, -50%) scale(1);
        }
        50% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1.1);
        }
      }

      .wrapper {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 2rem;
        max-width: 600px;
        width: 100%;
      }

      .logo {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: clamp(2.8rem, 8vw, 5rem);
        letter-spacing: -0.04em;
        line-height: 1;
        color: #ffffff;
        margin-bottom: 0.3rem;
      }

      .logo span {
        color: #00c8ff;
      }

      .tagline {
        font-family: "Space Mono", monospace;
        font-size: clamp(0.65rem, 2vw, 0.75rem);
        letter-spacing: 0.22em;
        color: #1e3a4a;
        text-transform: uppercase;
        margin-bottom: 4rem;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(0, 200, 255, 0.06);
        border: 1px solid rgba(0, 200, 255, 0.15);
        border-radius: 100px;
        padding: 6px 16px;
        margin-bottom: 2rem;
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #00c8ff;
        animation: blink 2s ease-in-out infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.2;
        }
      }

      .status-text {
        font-family: "Space Mono", monospace;
        font-size: 0.7rem;
        letter-spacing: 0.14em;
        color: #00c8ff;
        text-transform: uppercase;
      }

      .headline {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: clamp(2.2rem, 6vw, 3.6rem);
        line-height: 1.05;
        letter-spacing: -0.03em;
        margin-bottom: 1.25rem;
        color: #ffffff;
      }

      .headline em {
        color: #00c8ff;
        font-style: normal;
      }

      .subtext {
        font-size: clamp(0.9rem, 2vw, 1rem);
        color: #4a6070;
        line-height: 1.75;
        max-width: 400px;
        margin: 0 auto 3.5rem;
        font-weight: 400;
      }

      .progress-container {
        width: 100%;
        max-width: 340px;
        margin: 0 auto 1rem;
      }

      .progress-label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.6rem;
      }

      .progress-label span {
        font-family: "Space Mono", monospace;
        font-size: 0.65rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #1e3a4a;
      }

      .progress-label strong {
        font-family: "Space Mono", monospace;
        font-size: 0.7rem;
        letter-spacing: 0.06em;
        color: #00c8ff;
      }

      .bar-track {
        width: 100%;
        height: 2px;
        background: #0e1e2a;
        border-radius: 2px;
        overflow: hidden;
      }

      .bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #005f7a, #00c8ff);
        border-radius: 2px;
        width: 0%;
        animation: load-bar 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      @keyframes load-bar {
        0% {
          width: 0%;
        }
        100% {
          width: 15%;
        }
      }

      .dots {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 4rem;
      }

      .dots span {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: #0e1e2a;
        animation: dot-pulse 1.8s ease-in-out infinite;
      }

      .dots span:nth-child(2) {
        animation-delay: 0.25s;
      }
      .dots span:nth-child(3) {
        animation-delay: 0.5s;
      }

      @keyframes dot-pulse {
        0%,
        100% {
          background: #0e1e2a;
          transform: scale(1);
        }
        50% {
          background: #00c8ff;
          transform: scale(1.6);
        }
      }

      .footer {
        position: fixed;
        bottom: 2rem;
        left: 0;
        right: 0;
        text-align: center;
        font-family: "Space Mono", monospace;
        font-size: 0.65rem;
        color: #1a2a35;
        letter-spacing: 0.1em;
        z-index: 1;
      }

      .footer a {
        color: #1e3a4a;
        text-decoration: none;
        transition: color 0.2s;
      }

      .footer a:hover {
        color: #00c8ff;
      }

      @media (max-width: 480px) {
        .tagline {
          margin-bottom: 3rem;
        }
        .subtext {
          margin-bottom: 2.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="grid-bg" aria-hidden="true"></div>
    <div class="glow" aria-hidden="true"></div>

    <div class="wrapper">
      <div class="logo">SPIKED<span>TECH</span></div>
      <div class="tagline">Technology Solutions</div>

      <div class="status-badge" aria-hidden="true">
        <div class="status-dot"></div>
        <span class="status-text">Mantenimiento activo</span>
      </div>

      <h1 class="headline">
        Algo mejor<br />
        está en <em>construcción</em>
      </h1>

      <p class="subtext">
        Estamos renovando el sitio para traerte una experiencia más rápida y
        moderna. Volvemos pronto.
      </p>

      <div
        class="progress-container"
        role="progressbar"
        aria-valuenow="15"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-label="Progreso de remodelación"
      >
        <div class="progress-label">
          <span>Progreso</span>
          <strong>15%</strong>
        </div>
        <div class="bar-track">
          <div class="bar-fill"></div>
        </div>
      </div>

      <div class="dots" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
    </footer>
  </body>
</html>
